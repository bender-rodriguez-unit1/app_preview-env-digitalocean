apiVersion: v1
kind: Canvas
metadata:
  name: DO Droplet Test
  description: Manual run → create droplet → delete droplet
spec:
  nodes:
    - id: manual-trigger
      name: Manual Run
      type: TYPE_TRIGGER
      component: start
      configuration: {}
      position:
        x: 200
        'y': 200

    - id: create-droplet
      name: Create Droplet
      type: TYPE_ACTION
      component: digitalocean.createDroplet
      configuration:
        name: '{{ install_params.droplet_name }}'
        region: nyc1
        size: s-1vcpu-1gb
        image: ubuntu-24-04-x64
      position:
        x: 600
        'y': 200

    - id: delete-droplet
      name: Delete Droplet
      type: TYPE_ACTION
      component: digitalocean.deleteDroplet
      configuration:
        droplet: '{{ previous().data.droplet.id }}'
      position:
        x: 1000
        'y': 200

  edges:
    - source: manual-trigger
      target: create-droplet
      channel: default
    - source: create-droplet
      target: delete-droplet
      channel: default
