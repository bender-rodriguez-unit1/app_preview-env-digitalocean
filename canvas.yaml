apiVersion: v1
kind: Canvas
metadata:
  name: DO Droplet Test
  description: Manual run → create droplet → delete droplet, with Daytona sandbox
spec:
  nodes:
    - id: manual-trigger
      name: Manual Run
      type: TYPE_TRIGGER
      component: start
      configuration: {}
      position:
        x: 200
        'y': 200

    - id: create-droplet
      name: Create Droplet
      type: TYPE_ACTION
      component: digitalocean.createDroplet
      configuration:
        name: '{{ install_params.droplet_name }}'
        region: '{{ install_params.region }}'
        size: s-1vcpu-1gb
        image: ubuntu-24-04-x64
      position:
        x: 600
        'y': 200

    - id: create-sandbox
      name: Create Sandbox
      type: TYPE_ACTION
      component: daytona.createSandbox
      configuration: {}
      position:
        x: 1000
        'y': 200

    - id: delete-droplet
      name: Delete Droplet
      type: TYPE_ACTION
      component: digitalocean.deleteDroplet
      configuration:
        droplet: '{{ previous().data.droplet.id }}'
      position:
        x: 600
        'y': 500

  edges:
    - sourceId: manual-trigger
      targetId: create-droplet
      channel: default
    - sourceId: create-droplet
      targetId: create-sandbox
      channel: default
    - sourceId: create-sandbox
      targetId: delete-droplet
      channel: default
