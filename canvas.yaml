apiVersion: v1
kind: Canvas
metadata:
  name: DO Droplet Test
  description: Manual run or Dash0 alert → create droplet → delete droplet
spec:
  nodes:
    - id: manual-trigger
      name: Manual Run
      type: TYPE_TRIGGER
      component: start
      configuration: {}
      position:
        x: 200
        'y': 200

    - id: alert-trigger
      name: Dash0 Alert
      type: TYPE_TRIGGER
      component: dash0.onAlertNotification
      configuration: {}
      position:
        x: 200
        'y': 500

    - id: create-droplet
      name: Create Droplet
      type: TYPE_ACTION
      component: digitalocean.createDroplet
      configuration:
        name: '{{ install_params.droplet_name }}'
        region: nyc1
        size: s-1vcpu-1gb
        image: ubuntu-24-04-x64
      position:
        x: 600
        'y': 350

    - id: delete-droplet
      name: Delete Droplet
      type: TYPE_ACTION
      component: digitalocean.deleteDroplet
      configuration:
        droplet: '{{ previous().data.droplet.id }}'
      position:
        x: 1000
        'y': 350

  edges:
    - sourceId: manual-trigger
      targetId: create-droplet
      channel: default
    - sourceId: alert-trigger
      targetId: create-droplet
      channel: default
    - sourceId: create-droplet
      targetId: delete-droplet
      channel: default
